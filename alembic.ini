# Alembic configuration for Aegis.
#
# The database URL below is only a placeholder: migrations/env.py overrides it at
# runtime from aegis.core.config.settings.database_url, so the same env-driven
# config used by the app is the single source of truth.

[alembic]
# Path to migration scripts (relative to this file).
script_location = migrations

# Template used by `alembic revision`.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Prepend the repo root so `import aegis...` works without installation.
prepend_sys_path = . src

# Use OS-native path separators when rendering paths.
# version_path_separator = os

# Placeholder only — env.py reads the real URL from AEGIS_DATABASE_URL / settings.
sqlalchemy.url = sqlite+aiosqlite:///./aegis.db


[post_write_hooks]
# Format newly generated migrations with ruff.
hooks = ruff_format ruff_lint
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_lint.type = console_scripts
ruff_lint.entrypoint = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME


# Logging configuration ------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
