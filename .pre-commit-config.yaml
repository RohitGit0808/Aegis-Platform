# Pre-commit hooks for Aegis. Install with: pre-commit install
# Run against everything with: pre-commit run --all-files
minimum_pre_commit_version: "3.5.0"
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint (with autofix), then format — order matters.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Local mypy hook so it runs in the project's own environment (with stubs &
  # the pydantic plugin available) rather than an isolated mirror env.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["src"]
