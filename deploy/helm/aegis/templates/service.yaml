apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegis.fullname" . }}-api
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "aegis.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
