apiVersion: batch/v1
kind: Job
metadata:
  name: aegis-migrate
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: migrate
    app.kubernetes.io/part-of: aegis-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: aegis
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/rohit-saxena/aegis-platform:1.0.0
          imagePullPolicy: IfNotPresent
          # Apply the schema before API/worker rollouts. Run this Job to
          # completion first (kubectl wait --for=condition=complete job/aegis-migrate).
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
