apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aegis-api
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aegis-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aegis-worker
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: aegis-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis
      app.kubernetes.io/component: worker
