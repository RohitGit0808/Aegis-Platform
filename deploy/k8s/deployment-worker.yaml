apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-worker
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: aegis-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: aegis-platform
        app.kubernetes.io/version: "1.0.0"
    spec:
      serviceAccountName: aegis
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/rohit-saxena/aegis-platform:1.0.0
          imagePullPolicy: IfNotPresent
          # arq consumes the queue defined in WorkerSettings; requires AEGIS_REDIS_URL.
          command: ["arq", "aegis.workers.arq_worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          # arq has no HTTP server; use its native health check (exits 0 when the
          # worker's health file is fresh). No extra packages needed.
          livenessProbe:
            exec:
              command: ["arq", "--check", "aegis.workers.arq_worker.WorkerSettings"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
