apiVersion: v1
kind: Service
metadata:
  name: aegis-api
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aegis-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
