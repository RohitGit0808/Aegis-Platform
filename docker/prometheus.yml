# ============================================================================
# Prometheus scrape configuration for the Aegis stack.
# Mounted into the prometheus container at /etc/prometheus/prometheus.yml.
# ============================================================================
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: aegis

scrape_configs:
  # Aegis API — RED + domain metrics exposed at GET /metrics.
  - job_name: aegis-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: aegis-api

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
